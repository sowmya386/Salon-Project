# Production profile - secure, minimal logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.com.salon=INFO
logging.level.org.springframework=WARN

# Validate schema only - no auto changes (use Flyway for migrations)
spring.jpa.hibernate.ddl-auto=validate

# Actuator - health and info only
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Sensitive config should come from environment
# spring.datasource.password=${DB_PASSWORD}
# jwt.secret=${JWT_SECRET}
# supabase.jwt-secret=${SUPABASE_JWT_SECRET}
