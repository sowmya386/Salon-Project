# ==================== COMMON (Zero-cost stack) ====================
# DB: Supabase free tier | Cache: Caffeine in-memory | No Redis/SMS/Stripe required
spring.application.name=salon-saas-api

# Datasource (override per env if needed)
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.autxuqyjzbylidpccoyd
spring.datasource.password=KwfPKni2$%-i8LU
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway (runs before Hibernate when enabled)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Server
server.port=8081

# JWT
jwt.secret=VEhJU19JU19NWV9TVVBFUl9TRUNSRVRfSldUX0tFWV8xMjM0NTY3OAAADk=
jwt.expiration=259200000

# Single-tenant: default salon name (used when salonName not provided in login/register)
salon.default-name=John Salon

# Supabase (Google OAuth)
supabase.url=https://autxuqyjzbylidpccoyd.supabase.co
supabase.jwt-secret=${SUPABASE_JWT_SECRET:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
# Stripe - low cost: 2.9%+$0.30 per transaction, no monthly fee
# Get keys from https://dashboard.stripe.com/apikeys (free account)
stripe.secret-key=${STRIPE_SECRET_KEY:}
# Create products/prices in Stripe Dashboard, then add Price IDs:
stripe.price-id.basic=${STRIPE_PRICE_BASIC:}
stripe.price-id.pro=${STRIPE_PRICE_PRO:}
stripe.price-id.enterprise=${STRIPE_PRICE_ENTERPRISE:}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Mail Configuration (Mocked for now via environment variables)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:mock_user@example.com}
spring.mail.password=${SMTP_PASS:mock_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/api-docs

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
